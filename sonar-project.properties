# sonar-project.properties
# Identificación del proyecto en SonarQube
sonar.projectKey=productos-service
sonar.projectName=Productos Service
sonar.projectVersion=1.0

# Rutas de código fuente y pruebas
sonar.sources=src/main/java
sonar.tests=src/test/java

# Binarios compilados (Maven los deja en target/classes)
sonar.java.binaries=target/classes

# Reporte de cobertura generado por JaCoCo (mvn clean verify)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Excluir la clase de arranque (no tiene lógica de negocio)
sonar.exclusions=**/*Application.java

# URL del servidor SonarQube local (levantado con Docker)
sonar.host.url=http://localhost:9000

# No bloquear el build si el Quality Gate falla (Post-Contenido 1 es solo análisis)
sonar.qualitygate.wait=false
